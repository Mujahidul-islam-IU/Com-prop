<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — LBKN Automator</title>
    <meta name="description" content="Reset your LBKN Automator password.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h1 class="auth-brand">LBKN Automator</h1>
                <p class="auth-subtitle">Reset your password</p>
            </div>

            <p class="auth-description">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

            <div id="auth-message" class="auth-message hidden"></div>

            <form id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <button type="submit" id="forgot-btn" class="auth-submit-btn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader hidden">
                        <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                <animateTransform attributeName="transform" type="rotate" dur="0.8s" from="0 12 12" to="360 12 12" repeatCount="indefinite"/>
                            </circle>
                        </svg>
                    </span>
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/login">← Back to Sign In</a></p>
            </div>
        </div>

        <p class="auth-powered">Commercial property sourcing, enquiry & reply tracking</p>
    </div>

    <script src="/static/auth.js"></script>
</body>

</html>
